# Fail2Ban jail for Nimbo web login.
#
# Reads failed-login lines from the systemd journal (no log file or extra
# permissions needed) and bans the offending IP at the firewall after too many
# failures. The real client IP comes through Caddy's X-Forwarded-For, so bans
# target the actual attacker, not 127.0.0.1.
#
# ⚠ This is only correct when the app is reachable SOLELY via the trusted
# proxy (bind HOSTNAME=127.0.0.1, only Caddy sets X-Forwarded-For). If the app
# is exposed directly, a client can spoof X-Forwarded-For and either evade a ban
# or get an innocent IP banned. See DEPLOYMENT.md ("프록시 뒤 바인딩").
#
# Requires the systemd backend (python3-systemd). install.sh installs it.

[nimbo]
enabled      = true
backend      = systemd
filter       = nimbo
journalmatch = _SYSTEMD_UNIT=nimbo.service
maxretry     = 5
findtime     = 600
bantime      = 3600
