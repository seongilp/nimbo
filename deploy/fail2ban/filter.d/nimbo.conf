# Fail2Ban filter for Nimbo web login failures.
# Nimbo writes one line per failed OS-password login to stderr, which systemd
# captures into the journal for unit nimbo.service. The `nimbo` jail reads it
# via the systemd backend (see jail.d/nimbo.conf).
#
# Matched line (from src/lib/system/auth.ts):
#   Nimbo authentication failure from 1.2.3.4 (user=foo)

[Definition]
failregex = ^Nimbo authentication failure from <HOST>
ignoreregex =
